name: FIFA World Cup 2026 - Video Generator

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM
  workflow_dispatch:      # Manual trigger
    inputs:
      episode_count:
        description: 'Number of episodes to generate'
        required: true
        default: '5'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '5'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download images
        run: python scripts/download_images.py

      - name: Generate videos
        run: python scripts/generate_videos.py ${{ inputs.episode_count || '5' }}

      - name: Upload videos as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worldcup-videos
          path: videos/
          retention-days: 7
