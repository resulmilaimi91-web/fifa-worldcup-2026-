name: FIFA World Cup 2026 - Complete Auto Generator

on:
  schedule:
    # Random minutes to avoid detection, premiere at varying times
    - cron: '17 13 * * 0'   # Sun 13:17 UTC
    - cron: '42 15 * * 2'   # Tue 15:42 UTC
    - cron: '8 11 * * 4'    # Thu 11:08 UTC
    - cron: '33 9 * * 5'    # Fri 09:33 UTC
    - cron: '55 19 * * 1'   # Mon 19:55 UTC
    - cron: '21 7 * * 3'    # Wed 07:21 UTC
  workflow_dispatch:
    inputs:
      episodes:
        description: 'Episodes to generate (1-5)'
        required: true
        default: '5'
        type: choice
        options: ['1', '2', '3', '4', '5']
      auto_release:
        description: 'Create GitHub Release?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      upload_youtube:
        description: 'Upload to YouTube? (disable if channel blocked)'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

jobs:
  analyze-and-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core
          pip install -r requirements.txt

      - name: Analyze FIFA channel style
        run: |
          python scripts/channel_analyzer.py || echo "Analysis optional"
          echo "Style analysis complete"

      - name: Download fresh images
        run: python scripts/download_images.py

      - name: Generate videos + thumbnails + metadata
        run: python scripts/generate_videos.py ${{ inputs.episodes || '5' }}

      - name: Upload to YouTube (Anti-Ban Mode)
        if: ${{ inputs.upload_youtube == 'true' }}
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
        run: |
          if [ -z "$YT_CLIENT_ID" ] || [ -z "$YT_CLIENT_SECRET" ] || [ -z "$YT_REFRESH_TOKEN" ]; then
            echo "YouTube secrets not set. Skipping upload."
            exit 0
          fi

          # Randomize premiere time: between 8h and 48h from now, random hour
          RANDOM_HOUR=$((RANDOM % 12 + 8))
          RANDOM_MINUTE=$((RANDOM % 60))
          RANDOM_DAY_OFFSET=$((RANDOM % 2 + 1))
          PUBLISH_AT=$(python3 -c "from datetime import datetime, timezone, timedelta; import random; now = datetime.now(timezone.utc); offset = timedelta(days=${RANDOM_DAY_OFFSET}, hours=${RANDOM_HOUR}, minutes=${RANDOM_MINUTE}); dt = now + offset; print(dt.strftime('%Y-%m-%dT%H:%M:%SZ'))")
          echo "Scheduled premiere window: $PUBLISH_AT"

          i=0
          for meta in videos/worldcup2026_episodi_*_metadata.json; do
            eid=$(echo "$meta" | grep -oP '\d+')
            video="videos/worldcup2026_episodi_${eid}.mp4"
            short="videos/worldcup2026_episodi_${eid}_short.mp4"

            # Random jitter: 30-180s between each upload
            JITTER=$((RANDOM % 150 + 30))
            
            if [ -f "$video" ]; then
              echo "Uploading episode $eid (jitter ${JITTER}s)..."
              python scripts/upload_youtube.py \
                --video "$video" \
                --metadata "$meta" \
                --publish-at "$PUBLISH_AT" \
                --jitter $JITTER \
                ${CHANNEL_NAME:+--channel-name "$CHANNEL_NAME"}
            fi

            if [ -f "$short" ]; then
              echo "Uploading short $eid..."
              python scripts/upload_youtube.py \
                --video "$short" \
                --metadata "$meta" \
                --privacy public \
                --jitter $((RANDOM % 60 + 10))
            fi

            i=$((i + 1))
          done

      - name: Create Release
        if: ${{ inputs.auto_release != 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ github.run_attempt }}
          name: "FIFA World Cup 2026 - Videos ${{ github.run_number }}"
          body: |
            ## 🎬 FIFA World Cup 2026 - Auto Generated Videos

            Generated at US Prime Time schedule.
            Optimized for YouTube (titles, descriptions, tags included).

            ### What's inside
            - 5 long videos (~2 min each)
            - 5 short videos (~30 sec each)
            - YouTube thumbnails
            - Viral-optimized metadata (titles, descriptions, tags)
            - Posting schedule: Mon/Wed/Fri/Sat at 20:00 ET
            
            ### Posting Tips
            - Post long videos Mon/Wed/Fri at 20:00 ET
            - Post shorts Sat/Sun at 12:00 ET
            - Use the metadata JSON files for copy-paste
          files: |
            videos/*.mp4
            videos/*.json
            thumbnails/*.jpg
          draft: false
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worldcup2026-full-release
          path: |
            videos/
            thumbnails/
          retention-days: 30
