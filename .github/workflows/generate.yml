name: FIFA World Cup 2026 - Full Video Generator

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      episodes:
        description: 'Number of episodes (1-5)'
        required: true
        default: '5'
        type: choice
        options: ['1', '2', '3', '4', '5']

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Download fresh images
        run: python scripts/download_images.py

      - name: Generate all videos (TTS + BGM + Ken Burns)
        run: python scripts/generate_videos.py ${{ inputs.episodes || '5' }}

      - name: Upload videos
        uses: actions/upload-artifact@v4
        with:
          name: worldcup2026-videos-complete
          path: videos/
          retention-days: 14

      - name: Cleanup temp files
        run: |
          rm -rf tmp_tts tmp_vid tmp_slideshow tmp_ss __pycache__ scripts/__pycache__
