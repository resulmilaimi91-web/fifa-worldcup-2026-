name: FIFA World Cup 2026 - Complete Auto Generator

on:
  schedule:
    # Upload 1h before prime time, premiere at 00:00 UTC
    - cron: '0 23 * * 0'   # Sun 23:00 UTC = upload, premiere Mon 00:00 UTC (20:00 ET Sun)
    - cron: '0 23 * * 2'   # Tue 23:00 UTC = upload, premiere Wed 00:00 UTC (20:00 ET Tue)
    - cron: '0 23 * * 4'   # Thu 23:00 UTC = upload, premiere Fri 00:00 UTC (20:00 ET Thu)
    - cron: '0 23 * * 5'   # Fri 23:00 UTC = upload, premiere Sat 00:00 UTC (20:00 ET Fri)
  workflow_dispatch:
    inputs:
      episodes:
        description: 'Episodes to generate (1-5)'
        required: true
        default: '5'
        type: choice
        options: ['1', '2', '3', '4', '5']
      auto_release:
        description: 'Create GitHub Release?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

jobs:
  analyze-and-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core
          pip install -r requirements.txt

      - name: Analyze FIFA channel style
        run: |
          python scripts/channel_analyzer.py || echo "Analysis optional"
          echo "Style analysis complete"

      - name: Download fresh images
        run: python scripts/download_images.py

      - name: Generate videos + thumbnails + metadata
        run: python scripts/generate_videos.py ${{ inputs.episodes || '5' }}

      - name: Upload to YouTube (Premiere)
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          if [ -z "$YT_CLIENT_ID" ] || [ -z "$YT_CLIENT_SECRET" ] || [ -z "$YT_REFRESH_TOKEN" ]; then
            echo "YouTube secrets not set. Skipping upload."
            exit 0
          fi
          # Premiere at next midnight UTC (20:00 ET / 17:00 PT)
          PUBLISH_AT=$(python3 -c "from datetime import datetime, timezone, timedelta; now = datetime.now(timezone.utc); next_mid = now.replace(hour=0, minute=0, second=0, microsecond=0) + timedelta(days=1); print(next_mid.strftime('%Y-%m-%dT%H:%M:%SZ'))")
          for meta in videos/worldcup2026_episodi_*_metadata.json; do
            eid=$(echo "$meta" | grep -oP '\d+')
            video="videos/worldcup2026_episodi_${eid}.mp4"
            short="videos/worldcup2026_episodi_${eid}_short.mp4"
            if [ -f "$video" ]; then
              echo "Uploading episode $eid (premiere at $PUBLISH_AT)..."
              python scripts/upload_youtube.py --video "$video" --metadata "$meta" --publish-at "$PUBLISH_AT"
            fi
            if [ -f "$short" ]; then
              short_meta="videos/worldcup2026_episodi_${eid}_metadata.json"
              echo "Uploading short $eid..."
              python scripts/upload_youtube.py --video "$short" --metadata "$short_meta" --privacy public
            fi
          done

      - name: Create Release
        if: ${{ inputs.auto_release != 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ github.run_attempt }}
          name: "FIFA World Cup 2026 - Videos ${{ github.run_number }}"
          body: |
            ## 🎬 FIFA World Cup 2026 - Auto Generated Videos

            Generated at US Prime Time schedule.
            Optimized for YouTube (titles, descriptions, tags included).

            ### What's inside
            - 5 long videos (~2 min each)
            - 5 short videos (~30 sec each)
            - YouTube thumbnails
            - Viral-optimized metadata (titles, descriptions, tags)
            - Posting schedule: Mon/Wed/Fri/Sat at 20:00 ET
            
            ### Posting Tips
            - Post long videos Mon/Wed/Fri at 20:00 ET
            - Post shorts Sat/Sun at 12:00 ET
            - Use the metadata JSON files for copy-paste
          files: |
            videos/*.mp4
            videos/*.json
            thumbnails/*.jpg
          draft: false
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worldcup2026-full-release
          path: |
            videos/
            thumbnails/
          retention-days: 30
